github:
  tokens:
    # Per-token batch_interval / fetch_interval are optional overrides.
    # If omitted they fall back to github.batch_interval / github.fetch_interval.
    - token: "ghp_your_token_here"
      transport: "gist"
      # gist transport: 500/hr write quota → keep these conservative.
      batch_interval: 500ms
      fetch_interval: 500ms

    - token: "ghp_your_other_token_here"
      transport: "git"
      repo: "yourname/your-private-tunnel-repo"
      # git transport: no REST quota, push-based — run fast.
      batch_interval: 100ms
      fetch_interval: 200ms

  # One channel per token is enough; many virtual connections multiplex
  # over a single channel via the mux protocol.
  upstream_connections: 1

  # Global defaults — used by tokens that don't set their own intervals.
  batch_interval: 100ms
  fetch_interval: 200ms
  api_timeout: 10s

socks:
  listen_addr: "127.0.0.1:1080"
  timeout: 30s

encryption:
  algorithm: "xor"

rate_limit:
  max_requests_per_hour: 4500
  burst_limit: 25
  backoff_multiplier: 2.0
  low_remaining_warn: 30

logging:
  level: "info"
  format: "text"
  file: ""
